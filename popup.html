<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站动态播放列表</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f6f7f8;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #00a1d6, #00b5e5);
      color: white;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      cursor: pointer;
      font-size: 18px;
      opacity: 0.9;
      transition: all 0.2s;
      background: none;
      border: none;
      color: white;
      padding: 4px;
    }

    .header-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .stats {
      padding: 10px 18px;
      background: #ffffff;
      border-bottom: 1px solid #e3e5e7;
      font-size: 12px;
      color: #9499a0;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      scrollbar-width: thin;
      scrollbar-color: #c9ccd0 transparent;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-thumb {
      background: #c9ccd0;
      border-radius: 3px;
    }

    .playlist-item {
      padding: 14px 18px;
      border-bottom: 1px solid #f1f2f3;
      transition: background 0.2s;
    }

    .playlist-item:hover {
      background: #f6f7f8;
    }

    .item-author {
      color: #00a1d6;
      font-size: 13px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-title {
      color: #18191c;
      font-size: 15px;
      margin-bottom: 10px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .item-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      background: #00a1d6;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 13px;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }

    .item-link:hover {
      background: #00b5e5;
    }

    .empty-msg {
      padding: 60px 30px;
      text-align: center;
      color: #9499a0;
    }

    .empty-msg .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .loading {
      padding: 60px 30px;
      text-align: center;
      color: #9499a0;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #00a1d6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 设置面板样式 */
    .settings-panel {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .settings-panel.active {
      display: flex;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .main-panel.hidden {
      display: none;
    }

    .settings-form {
      padding: 20px;
      flex: 1;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #18191c;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e3e5e7;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00a1d6;
    }

    .form-group .hint {
      font-size: 12px;
      color: #9499a0;
      margin-top: 4px;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: #00a1d6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover {
      background: #00b5e5;
    }

    .btn-save:disabled {
      background: #c9ccd0;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: #333;
      color: white;
      border-radius: 6px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
    }

    .login-tip {
      padding: 20px;
      text-align: center;
      background: #fff7e6;
      border-bottom: 1px solid #ffd591;
    }

    .login-tip p {
      color: #d48806;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .login-tip a {
      color: #00a1d6;
      text-decoration: none;
    }

    .login-tip a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- 主面板 -->
  <div class="main-panel" id="mainPanel">
    <div class="header">
      <span class="header-title"><span>🎬</span>B站动态播放列表</span>
      <div class="header-actions">
        <button class="header-btn" id="refreshBtn" title="刷新">🔄</button>
        <button class="header-btn" id="settingsBtn" title="设置">⚙️</button>
      </div>
    </div>
    <div class="stats">
      <span class="video-count">视频数量: 0</span>
      <span class="update-time">更新时间: --</span>
    </div>
    <div class="login-tip" id="loginTip" style="display: none;">
      <p>⚠️ 请先登录B站账号</p>
      <a href="https://passport.bilibili.com/login" target="_blank">点击登录</a>
    </div>
    <div class="content" id="content">
      <div class="empty-msg">
        <div class="icon">📺</div>
        <div>点击刷新按钮加载数据</div>
      </div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="header">
      <span class="header-title"><span>⚙️</span>设置</span>
      <div class="header-actions">
        <button class="header-btn" id="backBtn" title="返回">←</button>
      </div>
    </div>
    <div class="settings-form">
      <div class="form-group">
        <label for="customApiUrl">自定义 API 地址（可选）</label>
        <input type="text" id="customApiUrl" placeholder="留空使用默认API">
        <p class="hint">高级用户可自定义API地址，留空使用默认</p>
      </div>
      <div class="form-group">
        <label for="refreshInterval">自动刷新间隔（分钟）</label>
        <input type="number" id="refreshInterval" min="0" max="60" value="0" placeholder="0表示不自动刷新">
        <p class="hint">设置为0表示不自动刷新，最大60分钟</p>
      </div>
      <div class="form-group">
        <label for="maxItems">最大显示数量</label>
        <input type="number" id="maxItems" min="10" max="100" value="50">
        <p class="hint">播放列表最大显示视频数量</p>
      </div>
      <button class="btn-save" id="saveBtn">保存设置</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
