<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站动态播放列表 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f6f7f8;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 32px;
      background: linear-gradient(135deg, #00a1d6, #00b5e5);
      color: white;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 32px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #18191c;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e3e5e7;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #18191c;
      font-weight: 500;
    }

    .form-group input[type="text"],
    .form-group input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e3e5e7;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00a1d6;
      box-shadow: 0 0 0 3px rgba(0, 161, 214, 0.1);
    }

    .form-group .hint {
      font-size: 12px;
      color: #9499a0;
      margin-top: 6px;
    }

    .form-group .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: #00a1d6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 24px;
    }

    .btn-save:hover {
      background: #00b5e5;
    }

    .btn-save:disabled {
      background: #c9ccd0;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.success {
      background: #52c41a;
    }

    .toast.error {
      background: #ff4d4f;
    }

    .info-box {
      padding: 16px;
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .info-box h3 {
      font-size: 14px;
      color: #0050b3;
      margin-bottom: 8px;
    }

    .info-box p {
      font-size: 13px;
      color: #0050b3;
      line-height: 1.6;
    }

    .info-box a {
      color: #00a1d6;
      text-decoration: none;
    }

    .info-box a:hover {
      text-decoration: underline;
    }

    .version {
      text-align: center;
      padding: 16px;
      color: #9499a0;
      font-size: 12px;
      border-top: 1px solid #e3e5e7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span>🎬</span>B站动态播放列表</h1>
      <p>扩展设置与配置</p>
    </div>

    <div class="content">
      <div class="info-box">
        <h3>📌 使用说明</h3>
        <p>
          本扩展需要您在浏览器中登录B站账号才能正常工作。<br>
          请确保您已访问 <a href="https://www.bilibili.com" target="_blank">bilibili.com</a> 并登录。
        </p>
      </div>

      <div class="section">
        <h2 class="section-title">API 设置</h2>
        
        <div class="form-group">
          <label for="customApiUrl">自定义 API 地址</label>
          <input type="text" id="customApiUrl" placeholder="留空使用默认API">
          <p class="hint">高级用户可自定义API地址，留空使用默认的动态API</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">显示设置</h2>
        
        <div class="form-group">
          <label for="maxItems">最大显示数量</label>
          <input type="number" id="maxItems" min="10" max="100" value="50">
          <p class="hint">播放列表最大显示视频数量（10-100）</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">刷新设置</h2>
        
        <div class="form-group">
          <label for="refreshInterval">自动刷新间隔（分钟）</label>
          <input type="number" id="refreshInterval" min="0" max="60" value="0">
          <p class="hint">设置为0表示不自动刷新，最大60分钟</p>
        </div>
      </div>

      <button class="btn-save" id="saveBtn">保存设置</button>
    </div>

    <div class="version">
      版本 1.2 | Edge 扩展
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="options.js"></script>
</body>
</html>
